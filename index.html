<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Missão Front-End</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="game">

    <div id="startScreen">
        <h1>Missão Front-End</h1>
        <p>Capture as tags corretas e construa seu conhecimento!</p>
        <button id="startBtn">Iniciar Jogo</button>
    </div>

  <div id="faseTexto"></div>

  <div id="hud">

  <div id="player"></div>

  <div id="endScreen"></div>

</div>

<script src="script.js"></script>

</body>
</html>
